<!DOCTYPE html>
<html>
<head>
    <title>Zoho Mail Clone</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        /* Zoho Blue Sidebar */
        .sidebar { width: 200px; background: #f5f7f8; border-right: 1px solid #ddd; padding: 20px; }
        .main-content { flex: 1; padding: 20px; background: white; }
        .header { background: #0055ff; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-link { display: block; padding: 10px; color: #333; text-decoration: none; border-radius: 4px; }
        .nav-link:hover { background: #e0e0e0; }
        .btn-compose { background: #0055ff; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; margin-bottom: 20px; }
        .user-info { font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: #0055ff;">Zoho</h2>
        <button class="btn-compose" onclick="location.href='/send/'">＋ New Mail</button>
        <nav>
            <a href="/inbox/" class="nav-link">📥 Inbox</a>
            <a href="/sent/" class="nav-link">📤 Sent</a>
            <a href="/trash/" class="nav-link">🗑️ Trash</a>
            <hr>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="nav-link" style="border:none; background:none; width:100%; text-align:left; cursor:pointer;">🚪 Logout</button>
            </form>
        </nav>
    </div>
    <div style="flex: 1; display: flex; flex-direction: column;">
        <div class="header">
            <span>Mail</span>
            <div class="user-info">Logged in as: <strong>{{ user.username }}</strong></div>
        </div>
        <div class="main-content">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</body>
</html>
