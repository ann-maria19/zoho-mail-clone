{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h2 style="color: #333; border-bottom: 2px solid #0055ff; padding-bottom: 10px;">New Message</h2>
    
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight: bold; margin-bottom: 5px;">To (Username):</label>
            <input type="text" name="recipient" required placeholder="e.g. boss" 
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight: bold; margin-bottom: 5px;">Subject:</label>
            <input type="text" name="subject" required placeholder="What is this about?" 
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight: bold; margin-bottom: 5px;">Message:</label>
            <textarea name="body" rows="8" required 
                      style="width:100%; padding:10px; border:1px solid #ccc; border-radius: 4px; font-family: inherit;"></textarea>
        </div>

        <button type="submit" 
                style="background: #0055ff; color: white; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-size: 16px;">
            🚀 Send Email
        </button>
    </form>
</div>
{% endblock %}
