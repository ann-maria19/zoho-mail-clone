<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <div>
                    <a href="/inbox/" class="btn btn-outline-secondary btn-sm">← Back to Inbox</a>
                    
                    <form action="/delete/{{ email.id }}/" method="POST" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm ms-2">🗑️ Delete</button>
                    </form>
                </div>
                <span class="text-muted">{{ email.timestamp }}</span>
            </div>
            <div class="card-body">
                <h2 class="card-title">{{ email.subject }}</h2>
                <hr>
                <p><strong>From:</strong> {{ email.sender }}</p>
                <p><strong>To:</strong> {{ email.recipient_email }}</p>
                <div class="mt-4 p-3 bg-white border rounded">
                    {{ email.body|linebreaks }}
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
