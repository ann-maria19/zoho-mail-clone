<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-white d-flex justify-content-between">
                <a href="/inbox/" class="btn btn-outline-secondary btn-sm">← Back to Inbox</a>
                <span class="text-muted">{{ email.timestamp }}</span>
            </div>
            <div class="card-body">
                <h2 class="card-title">{{ email.subject }}</h2>
                <hr>
                <p><strong>From:</strong> {{ email.sender }}</p>
                <p><strong>To:</strong> {{ email.recipient_email }}</p>
                <div class="mt-4 p-3 bg-white border rounded">
                    {{ email.body|linebreaks }}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
